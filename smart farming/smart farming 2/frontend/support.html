<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Farming Support</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("image/farm.jpg") no-repeat center center/cover;
color:white;
}

.overlay{
background:rgba(0,0,0,0.5);
height:100vh;
}

.header{
display:flex;
justify-content:space-between;
padding:20px 40px;
}

.nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

.center{
text-align:center;
margin-top:50px;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
padding:25px;
width:220px;
border-radius:15px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#4caf50;
color:white;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
color:black;
padding:20px;
border-radius:10px;
width:320px;
text-align:center;
}

input, textarea{
width:90%;
padding:8px;
margin:5px 0;
}

</style>

</head>

<body>

<div class="overlay">

<div class="header">
<h2>🌾 Smart Farming</h2>
<div class="nav">
<a href="home.html">Home</a>
<a href="support.html">Support</a>
<a href="login.html">Login</a>
<a href="about.html">About</a>
</div>
</div>

<div class="center">
<h1>Smart Farming Support</h1>
<p>Need help with farming tools?</p>
</div>

<div class="cards">

<div class="card">
<h3>📧 Email Support</h3>
<button onclick="openEmail()">Send Email</button>
</div>

<div class="card">
<h3>📞 Helpline</h3>
<button onclick="callNow()">Call Now</button>
</div>

<div class="card">
<h3>🌱 Crop Guidance</h3>
<button onclick="openGuidance()">Get Advice</button>
</div>

<div class="card">
<h3>🤖 AI Assistance</h3>
<button onclick="openAI()">Ask AI</button>
</div>

</div>

</div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

// ===== MODAL =====
function openModal(content){
document.getElementById("modal").style.display="flex";
document.getElementById("modalContent").innerHTML = content;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

// ===== EMAIL =====
function openEmail(){
openModal(`
<h3>Email Support</h3>
<input id="email" placeholder="Your Email"><br>
<textarea id="msg" placeholder="Message"></textarea><br>
<button onclick="sendMail()">Send</button>
<button onclick="closeModal()">Close</button>
`);
}

function sendMail(){
alert("Email Sent (demo) ✅");
closeModal();
}

// ===== CALL =====
function callNow(){
window.location.href="tel:+919999999999";
}

// ===== GUIDANCE =====
function openGuidance(){
openModal(`
<h3>Crop Guidance</h3>
<input id="crop" placeholder="Crop Name"><br>
<button onclick="getAdvice()">Get Advice</button>
<button onclick="closeModal()">Close</button>
`);
}

function getAdvice(){
let crop=document.getElementById("crop").value.toLowerCase();
alert("Use proper irrigation & fertilizer for "+crop+" 🌱");
closeModal();
}

// ===== AI =====
function openAI(){
openModal(`
<h3>🤖 Smart Farming AI</h3>

<div id="chatBox" style="height:250px;overflow:auto;background:#f5f5f5;padding:10px;margin-bottom:10px;"></div>

<input id="q" placeholder="Ask..." style="width:70%">
<button onclick="sendMsg()">Send</button>

<br><br>
<button onclick="closeModal()">Close</button>
`);
}

// ===== SEND MESSAGE (FIXED) =====
function sendMsg(){

let input=document.getElementById("q");
let msg=input.value.trim();

if(!msg) return;

let chat=document.getElementById("chatBox");

// user message
chat.innerHTML+=`<div style="text-align:right;color:green;">${msg}</div>`;

input.value="";

// loading
chat.innerHTML+=`<div id="loading">AI typing...</div>`;

fetch("http://127.0.0.1:5000/ask-ai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({question:msg})
})
.then(res=>{
if(!res.ok) throw new Error("Server error");
return res.json();
})
.then(data=>{

document.getElementById("loading").remove();

chat.innerHTML+=`
<div style="text-align:left;color:black;">
${data.answer}
</div>
`;

chat.scrollTop=chat.scrollHeight;

})
.catch(err=>{

document.getElementById("loading").innerText="Error ❌";
console.log(err);

});

}

</script>
<div id="aiBox" style="display:none" class="modal">
  <div class="modal-content" style="width:400px;height:500px;display:flex;flex-direction:column">

    <h3>🤖 Smart Farming AI</h3>

    <!-- CHAT AREA -->
    <div id="chatBox" style="flex:1;overflow-y:auto;padding:10px;background:#f5f5f5;border-radius:10px"></div>

    <!-- INPUT -->
    <div style="display:flex;margin-top:10px">
      <input id="aiInput" placeholder="Ask anything..." style="flex:1;padding:10px;border-radius:10px;border:1px solid #ccc">
      <button onclick="sendMessage()" style="margin-left:10px">Send</button>
    </div>

    <button onclick="closeAI()" style="margin-top:10px">Close</button>

  </div>
</div>

</body>
</html>
