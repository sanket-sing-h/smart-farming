<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Farming</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* BACKGROUND */
body{
height:100vh;
background:url("image/farm.jpg") no-repeat center center/cover;
}

/* TOP BAR */
.top-bar{
position:absolute;
top:0;
left:0;
width:100%;
padding:20px 40px;

display:flex;
justify-content:space-between;
align-items:center;

color:white;
}

.logo{
font-size:20px;
font-weight:bold;
}

.logout{
background:#ff5252;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
cursor:pointer;
}

/* HERO CENTER */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

/* OVERLAY */
.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
top:0;
left:0;
}

/* CONTENT */
.content{
position:relative;
z-index:2;
}

.content h1{
font-size:42px;
margin-bottom:10px;
}

.content p{
margin-bottom:30px;
}

/* CARDS GRID */
.cards{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
}

/* CARD */
.card{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);

padding:25px;
border-radius:15px;
width:220px;

box-shadow:0 8px 25px rgba(0,0,0,0.3);

transition:0.3s;
}

/* HOVER */
.card:hover{
transform:translateY(-10px) scale(1.05);
background:rgba(76,175,80,0.8);
}

/* BUTTON */
.card button{
margin-top:15px;
padding:10px 20px;

border:none;
border-radius:20px;

background:#00c853;
color:white;

cursor:pointer;
}

/* SECOND ROW SPACING */
.features-row{
margin-top:30px;
}

</style>

</head>

<body>

<!-- HEADER -->
<header class="top-bar">
    <div class="logo">🌾 Smart Farming System</div>
    <button class="logout">Logout</button>
</header>

<!-- HERO -->
<section class="hero">

    <div class="overlay"></div>

    <div class="content">
        <h1>Smart Farming System</h1>
        <p>Select what you want to open</p>

        <!-- MAIN CARDS -->
        <div class="cards">

            <div class="card">
                <h2>📊 Dashboard</h2>
                <button onclick="location.href='dashboard.html'">Open</button>
            </div>

            <div class="card">
                <h2>📞 Support</h2>
                <button onclick="location.href='support.html'">Open</button>
            </div>

            <div class="card">
                <h2>ℹ About</h2>
                <button onclick="location.href='about.html'">Open</button>
            </div>

        </div>

        <!-- FEATURES -->
        <div class="cards features-row">

            <div class="card">
                <h2>🌍 Land Info</h2>
                <button onclick="location.href='land.html'">Open</button>
            </div>

            <div class="card">
                <h2>🌦 Weather</h2>
                <button onclick="location.href='weather.html'">Open</button>
            </div>

            <div class="card">
                <h2>🚜 Land Prep</h2>
                <button onclick="location.href='landprep.html'">Open</button>
            </div>

            <div class="card">
                <h2>🦠 Disease</h2>
                <button onclick="location.href='disease.html'">Open</button>
            </div>

            <div class="card">
                <h2>🌱 Fertilizer</h2>
                <button onclick="location.href='fertilizer.html'">Open</button>
            </div>

            <div class="card">
                <h2>🏛 Schemes</h2>
                <button onclick="location.href='schemes.html'">Open</button>
            </div>

        </div>

    </div>

</section>

</body>
</html>
